<!DOCTYPE html>
<html lang="en">

<body>
     <!-- Navbar -->
    <header class="navbar">

            <img src="assets/images/WhatsApp Image 2026-06-30 at 17.24.41.jpeg" alt="logo">

        <nav class="nav-links">

<a href="collection.html"> <button class="shop-btn">Shop Now</button></a>

    <section class="shop">

        <h1>Our Collections</h1>

        
        <!-- Categories -->
        <div class="category-buttons">
            <button class="active" onclick="filterProducts('all')">All</button>
            <button onclick="filterProducts('rings')">Rings</button>

        <!-- Products -->
        <div class="products">

            <!-- Ring -->
            <div class="card rings">
                <img src="https://images.unsplash.com/photo-1605100804763-247f67b3557e">

                <p>₹45,000</p>
            </div>

            <div class="card rings">
                <img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638">
                <h3>Gold Ring</h3>
                <p>₹35,000</p>
            </div>

            <!-- Bangles -->
            <div class="card bangles">
                <img src="assets/images/b2.webp">
                <h3>Gold Bangles</h3>
                <p>₹85,000</p>
            </div>

            <div class="card bangles">
                <img src="https://images.unsplash.com/photo-1620656798579-1984d9e87df7">
                <h3>Designer Bangles</h3>
                <p>₹65,000</p>
            </div>

            <!-- Necklace -->
            <div class="card necklace">
                <img src="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f">

                <p>₹1,20,000</p>
            </div>

            <div class="card earrings">
                <img src="https://images.unsplash.com/photo-1635767798638-3e25273a8236">
                <h3> Earrings</h3>
                <p>₹55,000</p>
            </div>

        </div>
